<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Blog Post Writer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .md h1  { font-size: 1.9em; font-weight: 700; margin: 0.4em 0; }
    .md h2  { font-size: 1.4em; font-weight: 600; margin: 1.4em 0 0.5em; padding-bottom: 0.2em; border-bottom: 1px solid #334155; }
    .md h3  { font-size: 1.15em; font-weight: 600; margin: 1em 0 0.3em; }
    .md p   { margin-bottom: 0.9em; line-height: 1.75; }
    .md ul  { list-style: disc; margin: 0.5em 0 1em 1.5em; }
    .md ol  { list-style: decimal; margin: 0.5em 0 1em 1.5em; }
    .md li  { margin-bottom: 0.3em; line-height: 1.6; }
    .md strong { font-weight: 700; color: #e2e8f0; }
    .md em     { font-style: italic; }
    .md code   { background: #1e293b; padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.88em; }
    .md blockquote { border-left: 3px solid #475569; padding-left: 1em; color: #94a3b8; margin: 1em 0; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .d1 { animation: blink 1.2s infinite 0.0s; }
    .d2 { animation: blink 1.2s infinite 0.2s; }
    .d3 { animation: blink 1.2s infinite 0.4s; }

    .stage-card { transition: all 0.3s ease; }
    .stage-card.active  { background-color: #1e3a5f; border-color: #3b82f6; }
    .stage-card.done    { background-color: #14532d; border-color: #22c55e; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100">

  <div class="max-w-3xl mx-auto px-4 py-14">

    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-5xl font-extrabold mb-3 bg-gradient-to-r from-blue-400 via-violet-400 to-purple-400 bg-clip-text text-transparent">
        AI Blog Post Writer
      </h1>
      <p class="text-slate-400 text-base mb-5">A 4-agent pipeline powered by Gemini on Google Cloud Run</p>
      <div class="flex justify-center flex-wrap gap-2">
        <span class="text-xs bg-blue-500/15 text-blue-300 border border-blue-500/30 px-3 py-1 rounded-full">🔬 Researcher</span>
        <span class="text-xs text-slate-400 self-center">→</span>
        <span class="text-xs bg-violet-500/15 text-violet-300 border border-violet-500/30 px-3 py-1 rounded-full">📋 Outliner</span>
        <span class="text-xs text-slate-400 self-center">→</span>
        <span class="text-xs bg-green-500/15 text-green-300 border border-green-500/30 px-3 py-1 rounded-full">✍️ Writer</span>
        <span class="text-xs text-slate-400 self-center">→</span>
        <span class="text-xs bg-orange-500/15 text-orange-300 border border-orange-500/30 px-3 py-1 rounded-full">✨ Editor</span>
      </div>
    </div>

    <!-- Input Card -->
    <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-7 mb-7 backdrop-blur">
      <div class="mb-5">
        <label class="block text-slate-300 text-sm font-semibold mb-2" for="topic">Blog Post Topic</label>
        <input id="topic" type="text"
          placeholder="e.g. The rise of quantum computing, How to build better habits…"
          class="w-full bg-slate-900/70 border border-slate-600 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm" />
      </div>
      <div class="mb-6">
        <label class="block text-slate-300 text-sm font-semibold mb-2" for="tone">Writing Tone</label>
        <select id="tone"
          class="w-full bg-slate-900/70 border border-slate-600 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 transition text-sm">
          <option value="professional">Professional</option>
          <option value="conversational">Conversational</option>
          <option value="educational">Educational</option>
          <option value="inspirational">Inspirational</option>
          <option value="humorous">Humorous</option>
        </select>
      </div>
      <button id="btn" onclick="generate()"
        class="w-full py-4 rounded-xl font-semibold text-base bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-500 hover:to-violet-500 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        Generate Blog Post
      </button>
    </div>

    <!-- Progress -->
    <div id="loading" class="hidden bg-slate-800/60 border border-slate-700/60 rounded-2xl p-7 mb-7">
      <div class="flex items-center justify-center gap-2 mb-4">
        <div class="w-2.5 h-2.5 rounded-full bg-blue-500 d1"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-violet-500 d2"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-purple-500 d3"></div>
        <span class="ml-2 text-slate-300 font-medium">Pipeline running…</span>
      </div>
      <p id="status-text" class="text-center text-slate-400 text-sm mb-6">Initialising agents</p>
      <div class="grid grid-cols-4 gap-3">
        <div id="card-researcher" class="stage-card border border-slate-700 rounded-xl p-3 text-center">
          <div class="text-2xl mb-1">🔬</div>
          <div class="text-xs text-slate-400 font-medium">Researcher</div>
          <div id="dot-researcher" class="w-2 h-2 rounded-full bg-slate-600 mx-auto mt-2"></div>
        </div>
        <div id="card-outliner" class="stage-card border border-slate-700 rounded-xl p-3 text-center">
          <div class="text-2xl mb-1">📋</div>
          <div class="text-xs text-slate-400 font-medium">Outliner</div>
          <div id="dot-outliner" class="w-2 h-2 rounded-full bg-slate-600 mx-auto mt-2"></div>
        </div>
        <div id="card-writer" class="stage-card border border-slate-700 rounded-xl p-3 text-center">
          <div class="text-2xl mb-1">✍️</div>
          <div class="text-xs text-slate-400 font-medium">Writer</div>
          <div id="dot-writer" class="w-2 h-2 rounded-full bg-slate-600 mx-auto mt-2"></div>
        </div>
        <div id="card-editor" class="stage-card border border-slate-700 rounded-xl p-3 text-center">
          <div class="text-2xl mb-1">✨</div>
          <div class="text-xs text-slate-400 font-medium">Editor</div>
          <div id="dot-editor" class="w-2 h-2 rounded-full bg-slate-600 mx-auto mt-2"></div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div id="error-box" class="hidden bg-red-950/40 border border-red-500/40 rounded-2xl p-5 mb-7">
      <p class="text-red-400 font-semibold mb-1">Something went wrong</p>
      <p id="error-msg" class="text-red-300 text-sm"></p>
    </div>

    <!-- Result -->
    <div id="result" class="hidden">
      <!-- Tab buttons -->
      <div class="flex gap-2 mb-4">
        <button onclick="tab('post')"    id="tab-post"    class="tabBtn active-tab px-4 py-2 rounded-lg text-sm font-medium">Final Post</button>
        <button onclick="tab('outline')" id="tab-outline" class="tabBtn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300">Outline</button>
        <button onclick="tab('research')"id="tab-research"class="tabBtn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300">Research</button>
        <button onclick="copyMd()" class="ml-auto px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300 hover:bg-slate-600 transition" id="copy-btn">Copy Markdown</button>
      </div>

      <div id="pane-post" class="pane bg-slate-800/60 border border-slate-700/60 rounded-2xl p-8">
        <div id="post-content" class="md text-slate-200 leading-relaxed"></div>
      </div>
      <div id="pane-outline" class="pane hidden bg-slate-800/60 border border-slate-700/60 rounded-2xl p-8">
        <div id="outline-content" class="md text-slate-200 leading-relaxed"></div>
      </div>
      <div id="pane-research" class="pane hidden bg-slate-800/60 border border-slate-700/60 rounded-2xl p-8">
        <div id="research-content" class="md text-slate-200 leading-relaxed"></div>
      </div>
    </div>

  </div>

  <script>
    let rawMarkdown = '';

    const STAGES = ['researcher','outliner','writer','editor'];
    const STAGE_MSGS = {
      researcher: '🔬 Researcher is gathering information…',
      outliner:   '📋 Outliner is structuring the post…',
      writer:     '✍️  Writer is drafting the content…',
      editor:     '✨  Editor is polishing the final piece…',
    };
    // ~35s per agent for progress animation
    const STAGE_DELAY_MS = 35000;

    async function generate() {
      const topic = document.getElementById('topic').value.trim();
      const tone  = document.getElementById('tone').value;
      if (!topic) { alert('Please enter a topic.'); return; }

      // Reset UI
      document.getElementById('btn').disabled = true;
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('error-box').classList.add('hidden');
      STAGES.forEach(s => {
        document.getElementById(`card-${s}`).className = 'stage-card border border-slate-700 rounded-xl p-3 text-center';
        document.getElementById(`dot-${s}`).className = 'w-2 h-2 rounded-full bg-slate-600 mx-auto mt-2';
      });

      // Animate stages
      let idx = 0;
      function advanceStage() {
        if (idx > 0) {
          const prev = STAGES[idx-1];
          document.getElementById(`card-${prev}`).classList.add('done');
          document.getElementById(`dot-${prev}`).className = 'w-2 h-2 rounded-full bg-green-400 mx-auto mt-2';
        }
        if (idx < STAGES.length) {
          const cur = STAGES[idx];
          document.getElementById(`card-${cur}`).classList.add('active');
          document.getElementById(`dot-${cur}`).className = 'w-2 h-2 rounded-full bg-blue-400 animate-pulse mx-auto mt-2';
          document.getElementById('status-text').textContent = STAGE_MSGS[cur];
          idx++;
        }
      }
      advanceStage();
      const timer = setInterval(advanceStage, STAGE_DELAY_MS);

      try {
        const resp = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, tone }),
        });

        clearInterval(timer);

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          throw new Error(err.detail || 'Unknown error');
        }

        const data = await resp.json();
        rawMarkdown = data.blog_post || '';

        document.getElementById('post-content').innerHTML     = marked.parse(data.blog_post || '');
        document.getElementById('outline-content').innerHTML  = marked.parse((data.stages || {}).outline  || '');
        document.getElementById('research-content').innerHTML = marked.parse((data.stages || {}).research || '');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        tab('post');

      } catch(e) {
        clearInterval(timer);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-box').classList.remove('hidden');
        document.getElementById('error-msg').textContent = e.message;
      } finally {
        document.getElementById('btn').disabled = false;
      }
    }

    function tab(name) {
      document.querySelectorAll('.pane').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tabBtn').forEach(el => {
        el.className = 'tabBtn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300';
      });
      document.getElementById(`pane-${name}`).classList.remove('hidden');
      document.getElementById(`tab-${name}`).className = 'tabBtn px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white';
    }

    function copyMd() {
      navigator.clipboard.writeText(rawMarkdown).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Markdown', 2000);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('topic').addEventListener('keydown', e => {
        if (e.key === 'Enter') generate();
      });
    });
  </script>
</body>
</html>
